<svg xmlns="http://www.w3.org/2000/svg" width="940" height="360" viewBox="0 0 940 360">
  <rect width="940" height="360" fill="#ffffff"/>
  <text x="34" y="44" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#222">困难负例策略的反常结果</text>
  <text x="34" y="72" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#555">只使用随机负例略高，说明当前困难负例策略还需要重新调参</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#333">
    <text x="280" y="112" font-weight="700">完整 R-GCN</text>
    <text x="470" y="112" font-weight="700">只使用随机负例</text>
