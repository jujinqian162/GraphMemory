  </g>

  <line x1="34" y1="128" x2="900" y2="128" stroke="#d0d0d0"/>
  <line x1="34" y1="196" x2="900" y2="196" stroke="#eeeeee"/>
  <line x1="34" y1="264" x2="900" y2="264" stroke="#eeeeee"/>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#222">
    <text x="50" y="168">Recall@5</text>
    <rect x="280" y="145" width="178" height="22" fill="#2f6f9f"/>
    <rect x="470" y="145" width="180" height="22" fill="#2c7a4b"/>
    <text x="662" y="162" fill="#2c7a4b" font-weight="700">+0.0100</text>
    <text x="332" y="162" fill="#fff">0.8891</text>
    <text x="522" y="162" fill="#fff">0.8991</text>

    <text x="50" y="236">Full Support@5</text>
    <rect x="280" y="213" width="153" height="22" fill="#2f6f9f"/>
    <rect x="470" y="213" width="156" height="22" fill="#2c7a4b"/>
    <text x="662" y="230" fill="#2c7a4b" font-weight="700">+0.0167</text>
    <text x="326" y="230" fill="#fff">0.7643</text>
    <text x="516" y="230" fill="#fff">0.7810</text>

    <text x="50" y="304">Connected Recall@10</text>
    <rect x="280" y="281" width="147" height="22" fill="#2f6f9f"/>
    <rect x="470" y="281" width="150" height="22" fill="#2c7a4b"/>
    <text x="662" y="298" fill="#2c7a4b" font-weight="700">+0.0175</text>
    <text x="323" y="298" fill="#fff">0.7345</text>
    <text x="513" y="298" fill="#fff">0.7519</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#555">
