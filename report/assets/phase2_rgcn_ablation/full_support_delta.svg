<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540">
  <rect width="940" height="540" fill="#ffffff"/>
  <text x="34" y="44" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#222">Full Support@5 相对完整 R-GCN 的变化</text>
  <text x="34" y="72" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#555">越往左说明去掉该组件后完整证据集合找回下降越大</text>
  <line x1="810" y1="100" x2="810" y2="486" stroke="#333" stroke-width="1.5"/>
  <text x="798" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#555">0</text>
  <line x1="200" y1="486" x2="875" y2="486" stroke="#d9d9d9" stroke-width="1"/>
  <text x="196" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#555">-0.20</text>
  <text x="351" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#555">-0.15</text>
  <text x="505" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#555">-0.10</text>
  <text x="657" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#555">-0.05</text>
  <text x="860" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#555">+0.02</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#222">
    <text x="34" y="126">去掉图消息传递</text>
    <rect x="281" y="108" width="529" height="24" fill="#b8323a"/>
    <text x="824" y="126" font-weight="700" fill="#b8323a">-0.1734</text>

    <text x="34" y="166">去掉 seed score</text>
    <rect x="559" y="148" width="251" height="24" fill="#d46a2c"/>
    <text x="824" y="166" font-weight="700" fill="#d46a2c">-0.0823</text>

    <text x="34" y="206">不区分边类型</text>
    <rect x="619" y="188" width="191" height="24" fill="#d46a2c"/>
    <text x="824" y="206" font-weight="700" fill="#d46a2c">-0.0627</text>

    <text x="34" y="246">去掉 bridge 边</text>
    <rect x="731" y="228" width="79" height="24" fill="#4f7ca8"/>
    <text x="824" y="246" fill="#4f7ca8">-0.0259</text>

    <text x="34" y="286">去掉 query-overlap 边</text>
    <rect x="734" y="268" width="76" height="24" fill="#4f7ca8"/>
    <text x="824" y="286" fill="#4f7ca8">-0.0250</text>

    <text x="34" y="326">去掉 entity-overlap 边</text>
    <rect x="737" y="308" width="73" height="24" fill="#4f7ca8"/>
    <text x="824" y="326" fill="#4f7ca8">-0.0240</text>

    <text x="34" y="366">去掉 sequential 边</text>
    <rect x="747" y="348" width="63" height="24" fill="#4f7ca8"/>
    <text x="824" y="366" fill="#4f7ca8">-0.0207</text>

    <text x="34" y="406">去掉边权重</text>
    <rect x="752" y="388" width="58" height="24" fill="#4f7ca8"/>
    <text x="824" y="406" fill="#4f7ca8">-0.0189</text>

    <text x="34" y="446">只使用随机负例</text>
    <rect x="810" y="428" width="51" height="24" fill="#2c7a4b"/>
    <text x="824" y="446" fill="#2c7a4b">+0.0167</text>
  </g>
